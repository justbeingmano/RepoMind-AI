<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b14" />
    <meta name="description" content="OpenSeek — hybrid search for open-source GitHub projects" />
    <title>OpenSeek — GitHub Project Search</title>
    <script>
      (function () {
        var t = localStorage.getItem('openseek-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.colorScheme = t;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = t === 'light' ? '#f4f6fb' : '#070b14';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
